<section class="pb-6" data-testid="policy-page">
  <div class="border border-stone-300 bg-white px-4 py-4 md:px-6 md:py-6" data-testid="policy-card">
    <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
      <div class="text-sm font-semibold tracking-tight text-stone-700" data-testid="policy-title">Policy</div>
      <a
        class="truncate font-mono text-xs text-stone-800 underline hover:text-stone-700"
        href="https://ordinals.com/address/<%= walletAddress %>"
        target="_blank"
        rel="noopener"
        data-testid="wallet-address-link"
      ><%= walletAddress %></a>
    </div>

    <div class="mt-4" data-testid="policy-yaml">
      <pre class="overflow-x-auto border border-stone-300 bg-stone-50/40 px-4 py-4 font-mono text-xs text-stone-900/80" data-testid="policy-pre"><%= policyYaml %></pre>
    </div>
  </div>
</section>

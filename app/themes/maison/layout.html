<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title><%= title %></title>
    <link rel="stylesheet" href="<%= assets.css %>" />
    <script type="module" src="<%= assets.js %>"></script>
  </head>
  <body
    data-controller="store body-class usd"
    data-action="wallet:connected@window->body-class#setConnected wallet:disconnected@window->body-class#setDisconnected"
    class="theme-maison min-h-screen bg-stone-50 text-stone-900 antialiased"
style="background-color: #f6f3ee;"
  >
    <div class="mx-auto w-full max-w-5xl px-5 pb-20 pt-10">
      <header
        class="relative z-20 flex items-center justify-between gap-4 border-b border-stone-300 pb-4"
        data-testid="topbar"
      >
        <div class="flex min-w-0 items-center gap-4">
          <a
            href="/"
            class="h-11 w-11 overflow-hidden rounded-[14px] border border-stone-300 bg-white"
            aria-label="Home"
            data-testid="home-link"
          >
            <img src="<%= CONFIG.artist_avatar_url %>" alt="" class="block h-full w-full object-cover" />
          </a>
          <div class="min-w-0">
            <a href="/" class="block min-w-0" data-testid="brand-home-link">
              <h1 class="truncate text-base font-semibold tracking-tight hover:text-stone-900" data-testid="brand-title"><%= CONFIG.artist_name %></h1>
            </a>
          </div>
        </div>

        <nav class="absolute left-1/2 hidden -translate-x-1/2 items-center gap-6 text-sm font-semibold tracking-tight text-stone-600 md:flex" data-testid="header-nav">
          <a class="hover:text-stone-900" href="/" data-testid="nav-home">Lots</a>
          <a class="hover:text-stone-900" href="/activity" data-testid="nav-activity">Results</a>
          <a class="hover:text-stone-900" href="/policy" data-testid="nav-policy">Policy</a>
        </nav>

        <div class="flex items-center justify-end gap-3" data-testid="header-right">
          <div data-controller="wallet" data-testid="connect-slot" data-action="keydown.esc@window->wallet#close mouseup@document->wallet#closeIfClickedOutside">
            <div
              data-wallet-target="selector"
              class="fixed bottom-0 right-0 z-40 w-full border border-stone-300 bg-stone-100/95 shadow-sm backdrop-blur transition-transform duration-300 ease-in-out translate-y-full data-[state=open]:translate-y-0 md:top-0 md:h-screen md:w-96 md:translate-y-0 md:translate-x-full md:data-[state=open]:translate-x-0"
              data-state="closed"
            >
              <div class="mx-auto mt-3 h-1 w-12 bg-white/20 md:hidden" data-action="click->wallet#close"></div>
              <div class="p-6">
                <div class="flex items-center justify-between gap-3">
                  <div class="text-sm font-semibold text-stone-700">Connect wallet</div>
                  <button class="inline-flex h-8 w-8 items-center justify-center border border-stone-300 bg-white text-stone-600 hover:border-stone-400 hover:bg-stone-100 hover:text-stone-800" type="button" aria-label="Close" data-action="wallet#close">×</button>
                </div>
                <div class="mt-4 space-y-3">
                  <button class="flex w-full items-center justify-center gap-2 border border-stone-300 bg-white px-4 py-3 text-sm font-semibold tracking-tight text-stone-700 hover:border-stone-400 hover:bg-stone-100" data-wallet-target="xverse" data-action="wallet#authorize:prevent" data-wallet-provider-param="xverse">
                    <img src="/wallets/xverse.png" class="h-4 w-4" alt="" />
                    <span>Xverse</span>
                  </button>
                  <button class="flex w-full items-center justify-center gap-2 border border-stone-300 bg-white px-4 py-3 text-sm font-semibold tracking-tight text-stone-700 hover:border-stone-400 hover:bg-stone-100" data-wallet-target="unisat" data-action="wallet#authorize:prevent" data-wallet-provider-param="unisat">
                    <img src="/wallets/unisat.png" class="h-5 w-5" alt="" />
                    <span>Unisat</span>
                  </button>
                </div>
              </div>
            </div>

            <div class="hide-on-connected">
              <button class="border border-stone-300 bg-white px-4 py-2 text-sm font-semibold tracking-tight text-stone-700 hover:border-stone-400 hover:bg-stone-100" data-action="wallet#select">Sign In</button>
            </div>

            <div class="show-on-connected">
              <div class="relative z-30 inline-flex" data-controller="dropdown" data-action="mouseup@window->dropdown#hide">
                <button class="inline-flex items-center gap-2 border border-stone-300 bg-white px-4 py-2 text-sm font-semibold tracking-tight text-stone-700 hover:border-stone-400 hover:bg-stone-100" data-action="dropdown#toggle">
                  <span data-wallet-target="addressPreview"></span>
                  <span class="text-stone-500">▾</span>
                </button>
                <div class="absolute right-0 top-full z-50 mt-1 hidden w-48 border border-stone-300 bg-stone-50 p-1 shadow-sm" data-dropdown-target="menu">
                  <a class="block bg-synth-red/15 px-3 py-2 text-sm font-semibold text-stone-800 hover:bg-synth-red/20" href="#" data-action="wallet#logout:prevent dropdown#toggle">Disconnect</a>
                </div>
              </div>
            </div>
          </div>
          <div class="relative md:hidden" data-controller="dropdown" data-action="mouseup@window->dropdown#hide" data-testid="nav-menu">
            <button
              class="inline-flex h-10 w-10 items-center justify-center border border-stone-300 bg-white text-stone-700 hover:border-stone-400 hover:bg-stone-100"
              type="button"
              aria-label="Menu"
              data-action="dropdown#toggle"
              data-testid="nav-menu-button"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 7h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M4 12h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M4 17h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="absolute right-0 top-full z-50 mt-1 hidden w-44 border border-stone-300 bg-stone-50 p-1 shadow-sm" data-dropdown-target="menu" data-testid="nav-menu-list">
              <a class="block px-3 py-2 text-sm font-semibold text-stone-700 hover:bg-stone-100" href="/" data-testid="nav-menu-home">Lots</a>
              <a class="block px-3 py-2 text-sm font-semibold text-stone-700 hover:bg-stone-100" href="/activity" data-testid="nav-menu-activity">Results</a>
              <a class="block px-3 py-2 text-sm font-semibold text-stone-700 hover:bg-stone-100" href="/policy" data-testid="nav-menu-policy">Policy</a>
            </div>
          </div>
        </div>
      </header>

      <main class="mt-4" data-store-target="main">
        <%- body %>
      </main>

      <footer class="mt-10 flex flex-wrap items-center justify-between gap-3 border-t border-stone-300 pt-4 text-xs text-stone-500" data-testid="footer">
        <div class="text-xs text-stone-500" data-testid="footer-brand">
          <span class="text-stone-500">Built with </span>
          <a class="text-stone-800 hover:text-stone-700" href="https://github.com/lifofifoX/covenant" data-testid="footer-blizzard" target="_blank" rel="noopener">Covenant</a>
          <span class="text-stone-400"> from </span>
          <a class="text-stone-800 hover:text-stone-700" href="https://wizards.art/" data-testid="footer-wizards" target="_blank" rel="noopener">The Wizards of Ord</a>
        </div>
        <div class="flex items-center gap-3" data-testid="social">
          <a
            class="text-stone-500 hover:text-stone-900"
            href="https://wizards.art/"
            aria-label="Website"
            data-testid="social-website"
            target="_blank"
            rel="noopener"
          >
            <span aria-hidden="true">🌐</span>
          </a>
          <a
            class="text-stone-500 hover:text-stone-900"
            href="https://x.com/TheWizardsOfOrd"
            aria-label="X"
            data-testid="social-x"
            target="_blank"
            rel="noopener"
          >
            <span aria-hidden="true">𝕏</span>
          </a>
          <a
            class="text-stone-500 hover:text-stone-900"
            href="https://github.com/TheWizardsOfOrd"
            aria-label="GitHub"
            data-testid="social-github"
            target="_blank"
            rel="noopener"
          >
            <span aria-hidden="true">🐙</span>
          </a>
        </div>
      </footer>
    </div>
  </body>
</html>

<section class="kg-page">
  <div class="kg-wrap">
    <header class="kg-hero">
      <div>
        <p class="kg-kicker">Bitcoin Knotzis</p>
        <h1>Gallery</h1>
        <p class="kg-copy">Search, filter, view originals, and download layered assets directly from the on-chain trait inscriptions.</p>
      </div>
      <a class="kg-trade" href="https://ord.net/collection/bitcoin-knotzis" target="_blank" rel="noopener">Trade on ord.net</a>
    </header>

    <section class="kg-controls">
      <input id="kgSearch" type="search" placeholder="Search #, name, trait..." />
      <select id="kgSort">
        <option value="asc">Number Asc</option>
        <option value="desc">Number Desc</option>
      </select>
      <button id="kgClear" type="button">Clear Filters</button>
    </section>

    <p id="kgWalletStatus" class="kg-wallet-status"></p>
    <button id="kgDownloadWalletAssets" class="kg-wallet-download" type="button">Download All Wallet Assets</button>

    <section id="kgFilters" class="kg-filters"></section>

    <p class="kg-count">Showing <span id="kgShowing">0</span> of <span id="kgTotal">0</span></p>

    <section id="kgGrid" class="kg-grid"></section>

    <div class="kg-more-wrap">
      <button id="kgMore" type="button">Load More</button>
    </div>
  </div>
</section>

<div id="kgModal" class="kg-modal" aria-hidden="true">
  <div class="kg-modal-bg" data-close></div>
  <div class="kg-modal-card">
    <button class="kg-close" type="button" data-close>×</button>

    <div id="kgModalArt" class="kg-modal-art"></div>

    <div class="kg-modal-info">
      <p class="kg-kicker">Original inscription media · 2048×2048</p>
      <h2 id="kgModalTitle"></h2>
      <p id="kgModalShortId" class="kg-short-id"></p>

      <div id="kgModalTraits" class="kg-modal-traits"></div>

      <div class="kg-full-id">
        <span>Full inscription ID</span>
        <code id="kgModalFullId"></code>
      </div>

      <div class="kg-actions">
        <button id="kgCopyId" type="button">Copy ID</button>
        <a id="kgViewOrdinal" target="_blank" rel="noopener">View Ordinal</a>
        <a id="kgOpenOriginal" target="_blank" rel="noopener">Open Original</a>
        <button id="kgDownloadPng" type="button">Download PNG</button>
        <button id="kgDownloadHtml" type="button">Download Animated HTML</button>
        <button id="kgDownloadGif" type="button">Download GIF</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { LAYERS, TRAITS } from '/knotzi-traits.js'

  const BASE = 'https://ordinals.com/content/'
  const JSON_URL = '/magiceden_inscriptions_BitcoinKnotzi_chronoIDs.json'
  const PAGE_SIZE = 80

  let allItems = []
  let filtered = []
  let visibleCount = PAGE_SIZE
  let activeItem = null
  let walletMode = null
  let walletMatchedItems = []
  let walletDebounce = null

  const els = {
    search: document.getElementById('kgSearch'),
    walletStatus: document.getElementById('kgWalletStatus'),
    downloadWalletAssets: document.getElementById('kgDownloadWalletAssets'),
    sort: document.getElementById('kgSort'),
    clear: document.getElementById('kgClear'),
    filters: document.getElementById('kgFilters'),
    grid: document.getElementById('kgGrid'),
    showing: document.getElementById('kgShowing'),
    total: document.getElementById('kgTotal'),
    more: document.getElementById('kgMore'),
    modal: document.getElementById('kgModal'),
    modalArt: document.getElementById('kgModalArt'),
    modalTitle: document.getElementById('kgModalTitle'),
    modalShortId: document.getElementById('kgModalShortId'),
    modalFullId: document.getElementById('kgModalFullId'),
    modalTraits: document.getElementById('kgModalTraits'),
    copyId: document.getElementById('kgCopyId'),
    viewOrdinal: document.getElementById('kgViewOrdinal'),
    openOriginal: document.getElementById('kgOpenOriginal'),
    downloadPng: document.getElementById('kgDownloadPng'),
    downloadHtml: document.getElementById('kgDownloadHtml'),
    downloadGif: document.getElementById('kgDownloadGif'),
  }

  const activeFilters = Object.fromEntries(LAYERS.map(layer => [layer, '']))

  function looksLikeBitcoinAddress(value) {
    const address = String(value || '').trim()
    return /^(bc1|tb1)[a-z0-9]{20,90}$/i.test(address) ||
      /^[13][a-km-zA-HJ-NP-Z1-9]{25,40}$/.test(address)
  }

  function setWalletStatus(message, active = false) {
    els.walletStatus.textContent = message || ''
    els.walletStatus.classList.toggle('active', Boolean(active && message))
  }

  function updateWalletDownloadButton() {
    const count = walletMatchedItems.length

    if (!walletMode || count === 0) {
      els.downloadWalletAssets.classList.remove('active')
      els.downloadWalletAssets.disabled = false
      els.downloadWalletAssets.textContent = 'Download All Wallet Assets'
      return
    }

    els.downloadWalletAssets.classList.add('active')
    els.downloadWalletAssets.disabled = false
    els.downloadWalletAssets.textContent =
      count === 1 ? 'Download 1 Wallet Asset' : `Download All ${count} Wallet Assets`
  }

  async function lookupWallet(address) {
    setWalletStatus('Checking wallet ownership...', true)

    try {
      const response = await fetch(`/api/knotzi-wallet?address=${encodeURIComponent(address)}`)

      if (!response.ok) {
        const data = await response.json().catch(() => ({}))
        throw new Error(data.error || 'Wallet lookup failed')
      }

      const data = await response.json()
      const ownedIds = new Set(data.inscriptionIds || [])
      const knotziIds = new Set(allItems.map(item => item.id))
      const matchedCount = [...ownedIds].filter(id => knotziIds.has(id)).length

      walletMode = {
        address,
        ids: ownedIds
      }

      walletMatchedItems = allItems.filter(item => ownedIds.has(item.id))
      updateWalletDownloadButton()

      setWalletStatus(
        matchedCount === 1
          ? `Wallet mode: 1 Bitcoin Knotzi found for ${address}. Clear Filters to exit.`
          : `Wallet mode: ${matchedCount} Bitcoin Knotzis found for ${address}. Clear Filters to exit.`,
        true
      )

      applyFilters()
    } catch (err) {
      console.error(err)
      walletMode = null
      walletMatchedItems = []
      updateWalletDownloadButton()
      setWalletStatus('Wallet lookup failed. Check the address or try again in a minute.', true)
      applyFilters()
    }
  }

  function nameOf(item) {
    return item?.meta?.name || 'Bitcoin Knotzi'
  }

  function numberOf(item) {
    const found = nameOf(item).match(/#\s*(\d+)/)
    return found ? Number(found[1]) : 0
  }

  function shortId(item) {
    const id = item?.id || ''
    return id.length > 18 ? id.slice(0, 8) + '...' + id.slice(-6) : id
  }

  function cleanName(name, ext) {
    return String(name || 'Bitcoin-Knotzi')
      .replace(/[^a-z0-9#]+/gi, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '')
      .replace('#', '')
      + '.' + ext
  }

  function traitValue(item, layer) {
    const value = item?.meta?.attributes?.find(a => a.trait_type === layer)?.value
    return value == null ? '' : String(value)
  }

  function traitId(layer, value) {
    return TRAITS[layer]?.find(t => t.name === value)?.id || ''
  }

  function partsFor(item) {
    return LAYERS.map(layer => {
      const value = traitValue(item, layer)
      const id = traitId(layer, value)
      return { layer, value, id }
    }).filter(x => x.value && x.id)
  }

  function buildSvg(item) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg')
    svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg')
    svg.setAttribute('viewBox', '0 0 2048 2048')
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet')

    for (const part of partsFor(item)) {
      const image = document.createElementNS('http://www.w3.org/2000/svg', 'image')
      image.setAttribute('href', BASE + part.id)
      image.setAttribute('width', '2048')
      image.setAttribute('height', '2048')
      image.setAttribute('preserveAspectRatio', 'none')
      svg.appendChild(image)
    }

    return svg
  }

  function renderFilters() {
    els.filters.innerHTML = ''

    for (const layer of LAYERS) {
      const wrap = document.createElement('div')
      wrap.className = 'kg-filter'

      const label = document.createElement('label')
      label.textContent = layer

      const select = document.createElement('select')
      select.innerHTML = `<option value="">All ${layer}</option>`

      const values = [...new Set(allItems.map(item => traitValue(item, layer)).filter(Boolean))].sort()

      for (const value of values) {
        const option = document.createElement('option')
        option.value = value
        option.textContent = value
        select.appendChild(option)
      }

      select.addEventListener('change', () => {
        activeFilters[layer] = select.value
        applyFilters()
      })

      wrap.appendChild(label)
      wrap.appendChild(select)
      els.filters.appendChild(wrap)
    }
  }

  function applyFilters() {
    const rawSearch = els.search.value.trim()
    const q = looksLikeBitcoinAddress(rawSearch) ? '' : rawSearch.toLowerCase()
    const walletIds = walletMode?.ids || null

    filtered = allItems.filter(item => {
      const haystack = [
        nameOf(item),
        String(numberOf(item)),
        shortId(item),
        ...(item.meta.attributes || []).map(a => `${a.trait_type} ${a.value || ''}`)
      ].join(' ').toLowerCase()

      const matchesSearch = !q || haystack.includes(q)

      const matchesWallet = !walletIds || walletIds.has(item.id)

      const matchesFilters = LAYERS.every(layer => {
        return !activeFilters[layer] || traitValue(item, layer) === activeFilters[layer]
      })

      return matchesSearch && matchesFilters && matchesWallet
    })

    filtered.sort((a, b) => {
      return els.sort.value === 'desc' ? numberOf(b) - numberOf(a) : numberOf(a) - numberOf(b)
    })

    visibleCount = PAGE_SIZE
    renderGrid()
  }

  function renderGrid() {
    const visible = filtered.slice(0, visibleCount)
    els.grid.innerHTML = ''

    for (const item of visible) {
      const card = document.createElement('article')
      card.className = 'kg-card'

      const art = document.createElement('div')
      art.className = 'kg-card-art'
      art.appendChild(buildSvg(item))

      const body = document.createElement('div')
      body.className = 'kg-card-body'

      const title = document.createElement('div')
      title.className = 'kg-card-title'
      title.textContent = nameOf(item)

      const id = document.createElement('div')
      id.className = 'kg-card-id'
      id.textContent = shortId(item)

      const traits = document.createElement('div')
      traits.className = 'kg-card-traits'

      for (const attr of item.meta.attributes || []) {
        if (attr.value == null) continue
        const chip = document.createElement('span')
        chip.className = 'kg-trait-chip'
        chip.textContent = `${attr.trait_type}: ${attr.value}`
        traits.appendChild(chip)
      }

      body.appendChild(title)
      body.appendChild(id)
      body.appendChild(traits)

      card.appendChild(art)
      card.appendChild(body)

      card.addEventListener('click', () => openModal(item))

      els.grid.appendChild(card)
    }

    els.showing.textContent = String(visible.length)
    els.total.textContent = String(filtered.length)
    els.more.style.display = visibleCount < filtered.length ? 'inline-block' : 'none'
  }

  function openModal(item) {
    activeItem = item

    els.modalTitle.textContent = nameOf(item)
    els.modalShortId.textContent = shortId(item)
    els.modalFullId.textContent = item.id || ''

    els.modalArt.innerHTML = ''
    els.modalArt.appendChild(buildSvg(item))

    els.modalTraits.innerHTML = ''
    for (const attr of item.meta.attributes || []) {
      if (attr.value == null) continue
      const chip = document.createElement('span')
      chip.className = 'kg-trait-chip'
      chip.textContent = `${attr.trait_type}: ${attr.value}`
      els.modalTraits.appendChild(chip)
    }

    els.viewOrdinal.href = item.id ? `https://ordinals.com/inscription/${item.id}` : '#'
    els.openOriginal.href = item.id ? BASE + item.id : '#'

    els.modal.classList.add('open')
    els.modal.setAttribute('aria-hidden', 'false')
    document.body.style.overflow = 'hidden'
  }

  function closeModal() {
    els.modal.classList.remove('open')
    els.modal.setAttribute('aria-hidden', 'true')
    document.body.style.overflow = ''
    activeItem = null
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url
    a.download = filename
    document.body.appendChild(a)
    a.click()
    a.remove()
    setTimeout(() => URL.revokeObjectURL(url), 2000)
  }

  function loadImage(url) {
    return new Promise((resolve, reject) => {
      const img = new Image()
      img.crossOrigin = 'anonymous'
      img.onload = () => resolve(img)
      img.onerror = () => reject(new Error('Could not load layer: ' + url))
      img.src = url
    })
  }

  async function downloadPng(item, button) {
    const old = button.textContent
    button.disabled = true
    button.textContent = 'Building PNG...'

    try {
      const canvas = document.createElement('canvas')
      canvas.width = 2048
      canvas.height = 2048
      const ctx = canvas.getContext('2d')

      for (const part of partsFor(item)) {
        const img = await loadImage(BASE + part.id)
        ctx.drawImage(img, 0, 0, 2048, 2048)
      }

      canvas.toBlob(blob => downloadBlob(blob, cleanName(nameOf(item), 'png')), 'image/png')
    } finally {
      button.disabled = false
      button.textContent = old
    }
  }

  function downloadAnimatedHtml(item) {
    const images = partsFor(item).map(part => {
      return `<image href="${BASE}${part.id}" width="2048" height="2048" preserveAspectRatio="none" />`
    }).join('\n    ')

    const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>${nameOf(item)}</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden}
svg{width:100%;height:100%;display:block}
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 2048" preserveAspectRatio="xMidYMid meet">
    ${images}
</svg>
</body>
</html>`

    downloadBlob(new Blob([html], { type: 'text/html' }), cleanName(nameOf(item) + '-animated', 'html'))
  }

  async function ensureGifEncoder() {
    if (window.GIF) return

    await new Promise((resolve, reject) => {
      const script = document.createElement('script')
      script.src = '/vendor/gif.js'
      script.onload = resolve
      script.onerror = reject
      document.head.appendChild(script)
    })
  }

  async function ensureGifDecoder() {
    if (window.__gifuct) return window.__gifuct

    try {
      window.__gifuct = await import('https://cdn.jsdelivr.net/npm/gifuct-js@2.1.2/+esm')
    } catch {
      window.__gifuct = await import('https://esm.sh/gifuct-js@2.1.2')
    }

    return window.__gifuct
  }

  async function fetchGifBuffer(url) {
    const res = await fetch(url, { mode: 'cors', cache: 'force-cache' })
    const buf = await res.arrayBuffer()
    const header = new TextDecoder().decode(new Uint8Array(buf.slice(0, 6)))
    if (!header.startsWith('GIF')) return null
    return buf
  }

  async function downloadGif(item, button) {
    const old = button.textContent
    button.disabled = true
    button.textContent = 'Preparing GIF...'

    try {
      const bg = partsFor(item).find(part => part.layer === 'Background')
      if (!bg) throw new Error('No background layer')

      const bgBuffer = await fetchGifBuffer(BASE + bg.id)
      if (!bgBuffer) {
        alert('This background is not a GIF. Use Download Animated HTML for animated AVIF layers.')
        return
      }

      const { parseGIF, decompressFrames } = await ensureGifDecoder()
      const parsed = parseGIF(bgBuffer)
      const frames = decompressFrames(parsed, true)

      const bgWidth = parsed.lsd.width
      const bgHeight = parsed.lsd.height
      const exportSize = 1024

      const bgCanvas = document.createElement('canvas')
      bgCanvas.width = bgWidth
      bgCanvas.height = bgHeight
      const bgCtx = bgCanvas.getContext('2d', { willReadFrequently: true })
      bgCtx.fillStyle = '#000'
      bgCtx.fillRect(0, 0, bgWidth, bgHeight)

      const patchCanvas = document.createElement('canvas')
      const patchCtx = patchCanvas.getContext('2d', { willReadFrequently: true })

      const outCanvas = document.createElement('canvas')
      outCanvas.width = exportSize
      outCanvas.height = exportSize
      const outCtx = outCanvas.getContext('2d', { willReadFrequently: true })

      const overlays = []
      for (const part of partsFor(item).filter(part => part.layer !== 'Background')) {
        overlays.push(await loadImage(BASE + part.id))
      }

      await ensureGifEncoder()

      const encoder = new window.GIF({
        workers: 2,
        quality: 8,
        width: exportSize,
        height: exportSize,
        workerScript: '/vendor/gif.worker.js'
      })

      const useFrames = frames.slice(0, 120)

      for (let i = 0; i < useFrames.length; i++) {
        const frame = useFrames[i]
        const dims = frame.dims

        patchCanvas.width = dims.width
        patchCanvas.height = dims.height

        const imageData = new ImageData(frame.patch, dims.width, dims.height)
        patchCtx.putImageData(imageData, 0, 0)

        bgCtx.drawImage(patchCanvas, dims.left, dims.top)

        outCtx.clearRect(0, 0, exportSize, exportSize)
        outCtx.drawImage(bgCanvas, 0, 0, exportSize, exportSize)

        for (const overlay of overlays) {
          outCtx.drawImage(overlay, 0, 0, exportSize, exportSize)
        }

        const delay = Math.max(40, frame.delay || 100)
        encoder.addFrame(outCtx, { copy: true, delay })

        button.textContent = `Building GIF ${i + 1}/${useFrames.length}`

        if (frame.disposalType === 2) {
          bgCtx.clearRect(dims.left, dims.top, dims.width, dims.height)
        }

        await new Promise(resolve => setTimeout(resolve, 0))
      }

      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error('GIF render timed out')), 150000)

        encoder.on('progress', p => {
          button.textContent = `Encoding GIF ${Math.round(p * 100)}%`
        })

        encoder.on('finished', blob => {
          clearTimeout(timer)
          downloadBlob(blob, cleanName(nameOf(item), 'gif'))
          resolve()
        })

        encoder.render()
      })
    } catch (err) {
      console.error(err)
      alert('GIF export failed for this one. Use Download Animated HTML as fallback.')
    } finally {
      button.disabled = false
      button.textContent = old
    }
  }


  async function ensureZip() {
    if (window.JSZip) return

    await new Promise((resolve, reject) => {
      const script = document.createElement('script')
      script.src = '/vendor/jszip.min.js'
      script.onload = resolve
      script.onerror = reject
      document.head.appendChild(script)
    })
  }

  async function pngBlobForItem(item) {
    const canvas = document.createElement('canvas')
    canvas.width = 2048
    canvas.height = 2048
    const ctx = canvas.getContext('2d')

    for (const part of partsFor(item)) {
      const img = await loadImage(BASE + part.id)
      ctx.drawImage(img, 0, 0, 2048, 2048)
    }

    return await new Promise(resolve => {
      canvas.toBlob(blob => resolve(blob), 'image/png')
    })
  }

  async function gifBlobForItem(item, backgroundBuffer, progressText) {
    const { parseGIF, decompressFrames } = await ensureGifDecoder()
    const parsed = parseGIF(backgroundBuffer)
    const frames = decompressFrames(parsed, true)

    const bgWidth = parsed.lsd.width
    const bgHeight = parsed.lsd.height
    const exportSize = 1024

    const bgCanvas = document.createElement('canvas')
    bgCanvas.width = bgWidth
    bgCanvas.height = bgHeight
    const bgCtx = bgCanvas.getContext('2d', { willReadFrequently: true })
    bgCtx.fillStyle = '#000'
    bgCtx.fillRect(0, 0, bgWidth, bgHeight)

    const patchCanvas = document.createElement('canvas')
    const patchCtx = patchCanvas.getContext('2d', { willReadFrequently: true })

    const outCanvas = document.createElement('canvas')
    outCanvas.width = exportSize
    outCanvas.height = exportSize
    const outCtx = outCanvas.getContext('2d', { willReadFrequently: true })

    const overlays = []
    for (const part of partsFor(item).filter(part => part.layer !== 'Background')) {
      overlays.push(await loadImage(BASE + part.id))
    }

    await ensureGifEncoder()

    const encoder = new window.GIF({
      workers: 2,
      quality: 8,
      width: exportSize,
      height: exportSize,
      workerScript: '/vendor/gif.worker.js'
    })

    const useFrames = frames.slice(0, 120)

    for (let i = 0; i < useFrames.length; i++) {
      const frame = useFrames[i]
      const dims = frame.dims

      patchCanvas.width = dims.width
      patchCanvas.height = dims.height

      const imageData = new ImageData(frame.patch, dims.width, dims.height)
      patchCtx.putImageData(imageData, 0, 0)

      bgCtx.drawImage(patchCanvas, dims.left, dims.top)

      outCtx.clearRect(0, 0, exportSize, exportSize)
      outCtx.drawImage(bgCanvas, 0, 0, exportSize, exportSize)

      for (const overlay of overlays) {
        outCtx.drawImage(overlay, 0, 0, exportSize, exportSize)
      }

      const delay = Math.max(40, frame.delay || 100)
      encoder.addFrame(outCtx, { copy: true, delay })

      if (progressText) progressText(`GIF frame ${i + 1}/${useFrames.length}`)

      if (frame.disposalType === 2) {
        bgCtx.clearRect(dims.left, dims.top, dims.width, dims.height)
      }

      await new Promise(resolve => setTimeout(resolve, 0))
    }

    return await new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject(new Error('GIF render timed out')), 150000)

      encoder.on('progress', p => {
        if (progressText) progressText(`Encoding GIF ${Math.round(p * 100)}%`)
      })

      encoder.on('finished', blob => {
        clearTimeout(timer)
        resolve(blob)
      })

      encoder.render()
    })
  }

  async function walletAssetBlob(item, progressText) {
    const bg = partsFor(item).find(part => part.layer === 'Background')

    if (bg) {
      const bgBuffer = await fetchGifBuffer(BASE + bg.id)

      if (bgBuffer) {
        const blob = await gifBlobForItem(item, bgBuffer, progressText)
        return {
          blob,
          filename: cleanName(nameOf(item), 'gif')
        }
      }
    }

    const blob = await pngBlobForItem(item)
    return {
      blob,
      filename: cleanName(nameOf(item), 'png')
    }
  }

  async function downloadWalletAssetsZip() {
    if (!walletMode || walletMatchedItems.length === 0) {
      alert('Paste a wallet address first, then wait for wallet mode to find Knotzis.')
      return
    }

    const count = walletMatchedItems.length

    if (count > 25) {
      const ok = confirm(`This wallet has ${count} Knotzis. Building all assets may take several minutes and use a lot of browser memory. Continue?`)
      if (!ok) return
    }

    const button = els.downloadWalletAssets
    const old = button.textContent
    button.disabled = true

    try {
      await ensureZip()

      const zip = new window.JSZip()
      const folder = zip.folder('bitcoin-knotzis-wallet-assets')

      for (let i = 0; i < walletMatchedItems.length; i++) {
        const item = walletMatchedItems[i]
        button.textContent = `Building ${i + 1}/${count}: ${nameOf(item)}`

        const result = await walletAssetBlob(item, msg => {
          button.textContent = `Building ${i + 1}/${count}: ${msg}`
        })

        folder.file(result.filename, result.blob)
      }

      button.textContent = 'Zipping assets...'

      const zipBlob = await zip.generateAsync(
        { type: 'blob' },
        meta => {
          button.textContent = `Zipping ${Math.round(meta.percent)}%`
        }
      )

      const safeAddress = walletMode.address.slice(0, 10) + '-' + walletMode.address.slice(-8)
      downloadBlob(zipBlob, `bitcoin-knotzis-${safeAddress}.zip`)
    } catch (err) {
      console.error(err)
      alert('Download All failed. Try fewer wallet assets or download individually.')
    } finally {
      button.disabled = false
      button.textContent = old
      updateWalletDownloadButton()
    }
  }


  document.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', closeModal))
  window.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal()
  })

  els.search.addEventListener('input', () => {
    const value = els.search.value.trim()

    clearTimeout(walletDebounce)

    if (looksLikeBitcoinAddress(value)) {
      setWalletStatus('Wallet address detected. Checking ownership...', true)
      walletDebounce = setTimeout(() => lookupWallet(value), 650)
      return
    }

    walletMode = null
    walletMatchedItems = []
    updateWalletDownloadButton()
    setWalletStatus('', false)
    applyFilters()
  })
  els.sort.addEventListener('change', applyFilters)
  els.more.addEventListener('click', () => {
    visibleCount += PAGE_SIZE
    renderGrid()
  })

  els.clear.addEventListener('click', () => {
    els.search.value = ''
    els.sort.value = 'asc'
    for (const key of Object.keys(activeFilters)) activeFilters[key] = ''
    els.filters.querySelectorAll('select').forEach(select => select.value = '')
    applyFilters()
  })

  els.copyId.addEventListener('click', async () => {
    if (!activeItem?.id) return
    await navigator.clipboard.writeText(activeItem.id)
  })

  els.downloadPng.addEventListener('click', () => {
    if (activeItem) downloadPng(activeItem, els.downloadPng)
  })

  els.downloadHtml.addEventListener('click', () => {
    if (activeItem) downloadAnimatedHtml(activeItem)
  })

  els.downloadWalletAssets.addEventListener('click', downloadWalletAssetsZip)

  els.downloadGif.addEventListener('click', () => {
    if (activeItem) downloadGif(activeItem, els.downloadGif)
  })

  async function init() {
    const res = await fetch(JSON_URL)
    allItems = await res.json()
    allItems = allItems.filter(item => item?.meta?.name && item?.meta?.attributes?.length)

    renderFilters()
    applyFilters()
  }

  init().catch(err => {
    console.error(err)
    els.grid.innerHTML = '<p style="color:white;font-weight:900;">Gallery failed to load. Check JSON and traits file.</p>'
  })
</script>

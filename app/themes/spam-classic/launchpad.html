<section class="knotzi-mint-archive-page" data-testid="launchpad-page">
  <div class="knotzi-mint-archive-grid">
    <div class="knotzi-mint-left">
      <div class="knotzi-mint-media">
        <img
          src="<%= CONFIG.launchpad_media_gif_url || '/bitcoin-knotzis-mint-loop.gif' %>"
          alt="Bitcoin Knotzis mint animation"
          loading="eager"
          decoding="async"
        />
      </div>
    </div>

    <aside class="knotzi-mint-right">
      <div class="knotzi-rhs-card" data-testid="purchase-panel">
        <div class="knotzi-rhs-kicker">Mint Status</div>
        <img class="knotzi-soldout-image" src="/sold-out.png" alt="Sold Out" />

        <p>
          The Bitcoin Knotzi's spam event has concluded.
        </p>

        <div class="knotzi-rhs-actions">
          <a class="knotzi-rhs-btn gallery" href="/gallery">Open Gallery</a>
          <div class="knotzi-join-regime">Join the regime</div>
          <a class="knotzi-rhs-btn trade" href="https://ord.net/collection/bitcoin-knotzis" target="_blank" rel="noopener">
            Trade on ord.net
          </a>
        </div>
      </div>
    </aside>
  </div>
</section>

<style id="knotzi-clean-mint-archive-layout">
  .knotzi-mint-archive-page {
    width: 100%;
    padding: clamp(24px, 5vw, 64px) 0;
    background: #bf1717;
  }

  .knotzi-mint-archive-grid {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    display: grid;
    grid-template-columns: minmax(0, 1.18fr) minmax(320px, 0.82fr);
    gap: clamp(22px, 4vw, 44px);
    align-items: start;
  }

  .knotzi-mint-left,
  .knotzi-mint-right {
    min-width: 0;
  }

  .knotzi-mint-media {
    background: #000;
    border: 4px solid #111;
    box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.35);
    overflow: hidden;
  }

  .knotzi-mint-media img {
    display: block;
    width: 100%;
    height: auto;
    max-height: 72vh;
    object-fit: contain;
    background: #000;
  }

  .knotzi-rhs-card {
    background: #f5efe7;
    color: #111;
    border: 4px solid #111;
    box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.35);
    padding: clamp(24px, 4vw, 42px);
  }

  .knotzi-rhs-kicker {
    color: #bf1717;
    font-weight: 900;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 0.9rem;
    margin-bottom: 1rem;
  }

  .knotzi-rhs-card h1 {
    margin: 0 0 1rem;
    color: #111;
    font-size: clamp(3.4rem, 8vw, 6.8rem);
    line-height: 0.86;
    text-transform: uppercase;
    font-weight: 900;
  }

  .knotzi-rhs-card p {
    margin: 0 0 1.5rem;
    color: #111;
    font-size: clamp(1.05rem, 1.7vw, 1.3rem);
    line-height: 1.45;
  }

  .knotzi-rhs-actions {
    display: grid;
    gap: 0.85rem;
  }

  .knotzi-rhs-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 58px;
    padding: 0 20px;
    border: 4px solid #111;
    text-decoration: none !important;
    text-transform: uppercase;
    font-weight: 900;
    text-align: center;
    color: #111 !important;
  }

  .knotzi-rhs-btn.gallery {
    background: #f7931a;
  }

  .knotzi-rhs-btn.trade {
    background: #111;
    color: #fff !important;
  }

  .knotzi-rhs-btn:hover {
    background: #fff !important;
    color: #111 !important;
  }

  @media (max-width: 860px) {
    .knotzi-mint-archive-grid {
      grid-template-columns: 1fr;
    }

    .knotzi-mint-media img {
      max-height: none;
    }
  }
</style>


<style id="knotzi-soldout-image-style">
  .knotzi-soldout-image {
    display: block;
    width: 100%;
    max-width: 560px;
    height: auto;
    margin: 0 0 1.25rem;
  }
</style>


<style id="knotzi-join-regime-style">
  .knotzi-join-regime {
    margin-top: 0.35rem;
    margin-bottom: -0.15rem;
    color: #111;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: center;
    font-size: 1.05rem;
  }
</style>
